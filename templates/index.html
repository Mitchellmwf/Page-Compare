<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Python automation</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    </head>
    <body>
        <h1 class="text-center my-5">Python Automation</h1>
        <div class="container my-5">
            <form action="{{ url_for('submit') }}" method="post">
                <div class="mb-3">
                    <label for="page1" class="form-label">Page 1</label>
                    <input type="text" class="form-control" id="page1" name="link1" placeholder="Paste the link to page 1 here" required>
                    {% if errors and errors.link1 %}
                        <div class="text-danger mt-1">{{ errors.link1 }}</div>
                    {% endif %}
                </div>
                <div class="mb-3">
                    <label for="page2" class="form-label">Page 2</label>
                    <input type="text" class="form-control" id="page2" name="link2" placeholder="Paste the link to page 2 here" required>
                    {% if errors and errors.link2 %}
                        <div class="text-danger mt-1">{{ errors.link2 }}</div>
                    {% endif %}
                </div>
                <button type="submit" class="btn btn-primary">Compare Pages</button>
            </form>
        </div>
        <div>
        {% if html_table %}
            <p>{{ html_table }}</p>
        {% endif %}
        </div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-YUe2LMpm4QNOIxGHWAMNP4YPzSRCoEIqVMPKHVnFd7QHTE7VRCFbB09MPVZ0t4e" crossorigin="anonymous"></script>
    </body>
</html>
